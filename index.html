<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk Dashboard</title>
    <style>
        /* --- Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212; /* 少しだけ深い黒へ変更し高級感を演出 */
            color: #e0e0e0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Scaling Container --- */
        #app-container {
            width: 960px;
            height: 1040px;
            min-width: 960px;
            min-height: 1040px;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            gap: 5rem; /* 時計とカレンダーの間の贅沢な余白 */
            padding: 3rem 4rem;
            transform-origin: center center;
        }

        /* --- 1. Premium Clock Area --- */
        .clock-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            width: 100%;
        }
        .clock-date {
            font-size: 3.5rem; /* 大幅にサイズアップ */
            margin-bottom: 0.5rem;
            letter-spacing: 0.08em;
            font-weight: 500;
            color: #cccccc;
        }
        .clock-time {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11rem; /* 極限までサイズアップ */
            font-weight: bold;
            letter-spacing: 0.05em;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); /* わずかなドロップシャドウで立体感を */
        }

        /* --- 2. Premium Calendar Area --- */
        .calendar-wrapper {
            width: 100%;
            max-width: 880px;
            background-color: #1a1a1a;
            padding: 3rem 4rem; /* パディングを拡大 */
            border-radius: 20px; /* 丸みを強くしてモダンに */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* 浮き出し効果 */
            border: 1px solid #2a2a2a;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
            padding: 0 1rem;
        }
        .cal-title {
            font-size: 2.8rem;
            font-weight: normal;
            letter-spacing: 0.1em;
            color: #ffffff;
        }
        .cal-controls button {
            background: #252525;
            border: 1px solid #333;
            color: #ccc;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            font-size: 1.3rem;
            border-radius: 8px;
            margin-left: 0.8rem;
            transition: all 0.2s ease;
        }
        .cal-controls button:hover { 
            background: #3a3a3a; 
            color: #fff; 
            border-color: #555;
        }
        .cal-controls button#today-btn { 
            background-color: #333; 
            border-color: #555;
            color: #fff;
            font-weight: bold;
        }

        /* 常に6行7列 (42マス) を維持するグリッド */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto repeat(6, 1fr); /* 曜日1行 + 日付6行 */
            gap: 8px; 
            text-align: center;
            width: 100%;
        }
        
        .day-name { 
            font-size: 1.4rem; 
            color: #888; 
            padding-bottom: 1rem; 
            font-weight: bold;
            border-bottom: 1px solid #333;
            margin-bottom: 0.5rem;
        }
        
        .cal-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70px; /* マスの高さを固定してリッチに */
            font-size: 2.2rem; /* 日付を大きく */
            color: #e0e0e0;
            border-radius: 12px;
            transition: background-color 0.2s;
        }
        
        /* 今日の日付の特別ハイライト */
        .is-today { 
            background-color: #ffffff; 
            color: #121212 !important; 
            font-weight: bold; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* 前月・翌月の日付（ミュート） */
        .muted {
            color: #444444 !important;
            font-weight: normal !important;
        }

        /* Color Utilities */
        .sunday, .holiday { color: #ff5252; }
        .saturday { color: #448aff; }

    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="clock-area">
            <div id="clock-date" class="clock-date"></div>
            <div id="clock-time" class="clock-time"></div>
        </div>

        <div class="calendar-wrapper">
            <div class="cal-header">
                <h2 id="cal-title" class="cal-title"></h2>
                <div class="cal-controls">
                    <button id="prev-btn">&lt;</button>
                    <button id="next-btn">&gt;</button>
                    <button id="today-btn">今日</button>
                </div>
            </div>
            <div id="cal-grid" class="cal-grid"></div>
        </div>

    </div>

    <script>
        // --- 0. オートスケーリング ---
        function fitToScreen() {
            const baseWidth = 960;
            const baseHeight = 1040;
            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
            document.getElementById('app-container').style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', fitToScreen);

        // --- 共通: 祝日判定ロジック ---
        function getJapaneseHolidays(year, month) {
            const holidays = {}; 
            const fixed = [{m:0,d:1,n:"元日"},{m:1,d:11,n:"建国記念の日"},{m:1,d:23,n:"天皇誕生日"},{m:3,d:29,n:"昭和の日"},{m:4,d:3,n:"憲法記念日"},{m:4,d:4,n:"みどりの日"},{m:4,d:5,n:"こどもの日"},{m:7,d:11,n:"山の日"},{m:10,d:3,n:"文化の日"},{m:10,d:23,n:"勤労感謝の日"}];
            const happy = [{m:0,n:2,n:"成人の日"},{m:6,n:3,n:"海の日"},{m:8,n:3,n:"敬老の日"},{m:9,n:2,n:"スポーツの日"}];
            function getNthMonday(y,m,n){ const fd=new Date(y,m,1).getDay(); return 1+(8-fd)%7+(n-1)*7; }
            function getEq(y,t){ return Math.floor((t=='spring'?20.8431:23.2488)+0.242194*(y-1980)-Math.floor((y-1980)/4)); }
            
            fixed.forEach(h=>{if(h.m===month)holidays[h.d]=h.n;});
            happy.forEach(h=>{if(h.m===month)holidays[getNthMonday(year,month,h.n)]=h.n;});
            if(month===2)holidays[getEq(year,'spring')]="春分の日";
            if(month===8)holidays[getEq(year,'autumn')]="秋分の日";

            const ld = new Date(year, month+1, 0).getDate();
            for(let d=1;d<=ld;d++){
                if(holidays[d]){
                    const dt=new Date(year,month,d);
                    if(dt.getDay()===0){
                        let nd=d+1; while(holidays[nd]&&nd<=ld)nd++;
                        if(nd<=ld)holidays[nd]="振替休日";
                    }
                }
            }
            for(let d=2;d<ld;d++){
                if(holidays[d-1]&&holidays[d+1]&&!holidays[d]){
                    const dt=new Date(year,month,d); if(dt.getDay()!==0)holidays[d]="国民の休日";
                }
            }
            return holidays;
        }

        // --- 1. 時計機能 ---
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateHTML = `${now.getFullYear()}年 ${now.getMonth() + 1}月 ${now.getDate()}日(${days[now.getDay()]})`;
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('clock-date').innerHTML = dateHTML;
            document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. カレンダー機能 (42マス完全固定ロジック) ---
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();
        const calTitle = document.getElementById('cal-title');
        const calGrid = document.getElementById('cal-grid');

        function renderCalendar(year, month) {
            calGrid.innerHTML = '';
            calTitle.textContent = `${year}年 ${month + 1}月`;
            
            const firstDayIndex = new Date(year, month, 1).getDay(); // 当月1日の曜日(0-6)
            const lastDate = new Date(year, month + 1, 0).getDate(); // 当月の最終日(28-31)
            const prevLastDate = new Date(year, month, 0).getDate(); // 前月の最終日
            const holidays = getJapaneseHolidays(year, month);
            
            // 曜日ヘッダーの描画
            ['日','月','火','水','木','金','土'].forEach((d,i)=>{
                const div = document.createElement('div'); 
                div.className = 'day-name';
                if(i===0) div.classList.add('sunday'); 
                if(i===6) div.classList.add('saturday');
                div.textContent = d; 
                calGrid.appendChild(div);
            });

            const totalCells = 42; // 常時6週(7x6)固定

            // 日付セルの描画ループ
            for(let i = 0; i < totalCells; i++) {
                const div = document.createElement('div');
                div.className = 'cal-cell';

                if(i < firstDayIndex) {
                    // --- 前月の日付 ---
                    const prevDate = prevLastDate - firstDayIndex + i + 1;
                    div.textContent = prevDate;
                    div.classList.add('muted');
                    
                } else if(i >= firstDayIndex && i < firstDayIndex + lastDate) {
                    // --- 当月の日付 ---
                    const currentDate = i - firstDayIndex + 1;
                    div.textContent = currentDate;
                    
                    const dt = new Date(year, month, currentDate);
                    if(dt.getDay() === 0) div.classList.add('sunday');
                    if(dt.getDay() === 6) div.classList.add('saturday');
                    if(holidays[currentDate]) div.classList.add('holiday');
                    
                    if(year === today.getFullYear() && month === today.getMonth() && currentDate === today.getDate()) {
                        div.classList.add('is-today');
                    }
                    
                } else {
                    // --- 翌月の日付 ---
                    const nextDate = i - (firstDayIndex + lastDate) + 1;
                    div.textContent = nextDate;
                    div.classList.add('muted');
                }

                calGrid.appendChild(div);
            }
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            currentMonth--;
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar(currentYear, currentMonth);
        });
        
        document.getElementById('next-btn').addEventListener('click', () => {
            currentMonth++;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentYear, currentMonth);
        });
        
        document.getElementById('today-btn').addEventListener('click', () => {
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar(currentYear, currentMonth);
        });

        // 初回描画
        renderCalendar(currentYear, currentMonth);

    </script>
</body>
</html>
