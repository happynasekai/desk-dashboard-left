<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk Dashboard</title>
    <style>
        /* --- Base & Reset --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Scaling Container (Vertical Mode) --- */
        #app-container {
            width: 960px;
            height: 1040px;
            min-width: 960px;
            min-height: 1040px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            /* 上下のパディングを縮小し、各要素間の隙間(gap)を4remから1.5remへ大幅に詰めています */
            padding: 2rem;
            gap: 1.5rem; 
            transform-origin: top center;
        }

        /* --- 1. Clock Area --- */
        .clock-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            width: 100%;
            /* 時計部分の余白も少し詰めます */
            margin-bottom: 0.5rem; 
        }
        .clock-date {
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
            font-weight: bold;
        }
        .clock-time {
            font-family: 'Courier New', Courier, monospace;
            font-size: 7rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        /* --- 2. Calendar Area --- */
        .calendar-wrapper {
            width: 100%;
            max-width: 800px;
            background-color: #1e1e1e;
            padding: 1.5rem 2rem; /* 内側の余白を少しスリムに */
            border-radius: 12px;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            width: 100%;
            padding: 0 0.5rem;
        }
        .cal-title {
            font-size: 2rem;
            font-weight: normal;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }
        .cal-controls button {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 6px;
            margin-left: 0.5rem;
            transition: all 0.2s;
        }
        .cal-controls button:hover { border-color: #888; color: #fff; }
        .cal-controls button#today-btn { border-color: #555; background-color: #252525; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px; /* マス目の隙間を縮小 */
            text-align: center;
            width: 100%;
        }
        .cal-cell {
            padding: 0.6rem 0; /* カレンダーの高さ調整 */
            font-size: 1.5rem;
            color: #bbb;
            border-radius: 8px;
        }
        .day-name { font-size: 1.1rem; color: #666; padding-bottom: 0.5rem; }
        .is-today { background-color: #e0e0e0; color: #1a1a1a !important; font-weight: bold; }

        /* --- 3. Weather Area --- */
        .weather-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem; /* 天気情報内の要素の隙間を縮小 */
            background-color: #1e1e1e;
            padding: 1.5rem 2.5rem; /* 内側の余白をスリムに */
            border-radius: 12px;
        }

        /* Today's Weather */
        .today-minimal {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }
        .tm-left {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .tm-desc {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.05em;
            line-height: 1.2;
        }
        .tm-meta {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            font-size: 1.4rem;
            color: #aaaaaa;
        }
        .tm-meta-loc { color: #dddddd; font-weight: 500; }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; }
        .meta-item svg { fill: currentColor; opacity: 0.8; font-size: 1.3rem; }
        .tm-right { text-align: right; }
        .tm-current-temp {
            font-size: 6rem; /* 温度のフォントサイズを少しだけ調整して高さを抑える */
            font-weight: 300;
            line-height: 0.8;
            color: #ffffff;
            letter-spacing: -0.05em;
        }

        /* Hourly Forecast */
        .hourly-forecast {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0.5rem 0; /* 上下余白を詰める */
            border-bottom: 1px solid #333;
        }
        .hourly-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        .hr-time { font-size: 1.3rem; font-weight: bold; color: #cccccc; }
        .hr-icon { width: 30px; height: 30px; color: #ffffff; fill: currentColor; }
        .hr-temp { font-size: 1.5rem; font-weight: bold; color: #ffffff; }
        .hr-rain { font-size: 1.2rem; color: #64b5f6; font-weight: bold; }

        /* Forecast List */
        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;  /* 週間予報の行間を詰める */
            width: 100%;
            padding-top: 0.5rem;
        }
        .forecast-row-min {
            display: grid;
            grid-template-columns: 100px 1fr auto; 
            align-items: center;
            width: 100%;
            font-size: 1.4rem;
        }
        .fc-date { font-weight: bold; letter-spacing: 0.05em; }
        .fc-desc { color: #cccccc; padding-left: 1rem; }
        .fc-meta {
            display: grid;
            grid-template-columns: 85px 85px 85px; 
            justify-items: start; 
            color: #aaaaaa;
        }

        /* Color Utilities */
        .sunday, .holiday { color: #cf6679; }
        .saturday { color: #64b5f6; }
        .text-high { color: #e0e0e0; }
        .text-low { color: #888888; }
        .text-rain { color: #64b5f6; }

    </style>
</head>
<body>

    <div id="app-container">
        
        <div class="clock-area">
            <div id="clock-date" class="clock-date"></div>
            <div id="clock-time" class="clock-time"></div>
        </div>

        <div class="calendar-wrapper">
            <div class="cal-header">
                <h2 id="cal-title" class="cal-title"></h2>
                <div class="cal-controls">
                    <button id="prev-btn">&lt;</button>
                    <button id="next-btn">&gt;</button>
                    <button id="today-btn">今日</button>
                </div>
            </div>
            <div id="cal-grid" class="cal-grid"></div>
        </div>

        <div class="weather-wrapper">
            <div class="today-minimal">
                <div class="tm-left">
                    <div class="tm-desc" id="cw-desc">--</div>
                    <div class="tm-meta">
                        <span class="tm-meta-loc" id="cw-loc">位置情報取得中...</span>
                        <div class="meta-item text-high">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2 160 448c0 17.7 14.3 32 32 32s32-14.3 32-32l0-306.7L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"></path></svg>
                            <span id="cw-high">--°</span>
                        </div>
                        <div class="meta-item text-low">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>
                            <span id="cw-low">--°</span>
                        </div>
                        <div class="meta-item text-rain">
                            <svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M192 512C86 512 0 426 0 320C0 228.8 130.2 57.7 166.6 11.7C172.6 4.2 181.5 0 191.1 0l1.8 0c9.6 0 18.5 4.2 24.5 11.7C253.8 57.7 384 228.8 384 320c0 106-86 192-192 192zM96 336c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 61.9 50.1 112 112 112c8.8 0 16-7.2 16-16s-7.2-16-16-16c-44.2 0-80-35.8-80-80z"></path></svg>
                            <span id="cw-rain">--%</span>
                        </div>
                    </div>
                </div>
                <div class="tm-right">
                    <div class="tm-current-temp" id="cw-temp">--°</div>
                </div>
            </div>

            <div class="hourly-forecast" id="hourly-forecast"></div>
            <div class="forecast-list" id="forecast-list"></div>
        </div>

    </div>

    <script>
        // --- 0. オートスケーリング (縦型 960x1040 基準) ---
        function fitToScreen() {
            const baseWidth = 960;
            const baseHeight = 1040;
            // 縦・横どちらが変わっても比率を崩さずに全体が収まるように計算
            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
            
            const container = document.getElementById('app-container');
            container.style.transform = `scale(${scale})`;
            
            // 余白部分の中央寄せ計算
            const scaledHeight = baseHeight * scale;
            const topMargin = Math.max(0, (window.innerHeight - scaledHeight) / 2);
            container.style.marginTop = `${topMargin}px`;
        }
        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', fitToScreen);

        // --- 共通: 祝日判定ロジック ---
        function getJapaneseHolidays(year, month) {
            const holidays = {}; 
            const fixed = [{m:0,d:1,n:"元日"},{m:1,d:11,n:"建国記念の日"},{m:1,d:23,n:"天皇誕生日"},{m:3,d:29,n:"昭和の日"},{m:4,d:3,n:"憲法記念日"},{m:4,d:4,n:"みどりの日"},{m:4,d:5,n:"こどもの日"},{m:7,d:11,n:"山の日"},{m:10,d:3,n:"文化の日"},{m:10,d:23,n:"勤労感謝の日"}];
            const happy = [{m:0,n:2,n:"成人の日"},{m:6,n:3,n:"海の日"},{m:8,n:3,n:"敬老の日"},{m:9,n:2,n:"スポーツの日"}];
            function getNthMonday(y,m,n){ const fd=new Date(y,m,1).getDay(); return 1+(8-fd)%7+(n-1)*7; }
            function getEq(y,t){ return Math.floor((t=='spring'?20.8431:23.2488)+0.242194*(y-1980)-Math.floor((y-1980)/4)); }
            
            fixed.forEach(h=>{if(h.m===month)holidays[h.d]=h.n;});
            happy.forEach(h=>{if(h.m===month)holidays[getNthMonday(year,month,h.n)]=h.n;});
            if(month===2)holidays[getEq(year,'spring')]="春分の日";
            if(month===8)holidays[getEq(year,'autumn')]="秋分の日";

            const ld = new Date(year, month+1, 0).getDate();
            for(let d=1;d<=ld;d++){
                if(holidays[d]){
                    const dt=new Date(year,month,d);
                    if(dt.getDay()===0){
                        let nd=d+1; while(holidays[nd]&&nd<=ld)nd++;
                        if(nd<=ld)holidays[nd]="振替休日";
                    }
                }
            }
            for(let d=2;d<ld;d++){
                if(holidays[d-1]&&holidays[d+1]&&!holidays[d]){
                    const dt=new Date(year,month,d); if(dt.getDay()!==0)holidays[d]="国民の休日";
                }
            }
            return holidays;
        }

        // --- 1. 時計機能 ---
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateHTML = `${now.getFullYear()}年 ${now.getMonth() + 1}月 ${now.getDate()}日(${days[now.getDay()]})`;
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('clock-date').innerHTML = dateHTML;
            document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 天気予報 (動的ジオロケーション対応) ---
        const DEFAULT_LAT = 35.5316;
        const DEFAULT_LON = 139.4907;

        function getWeatherText(code) {
            const map = {
                0: "快晴", 1: "晴れ", 2: "一部曇り", 3: "曇り",
                45: "霧", 48: "霧氷",
                51: "弱い霧雨", 53: "霧雨", 55: "強い霧雨", 56: "弱い着氷性霧雨", 57: "強い着氷性霧雨",
                61: "弱いにわか雨", 63: "雨", 65: "強い雨", 66: "弱い氷雨", 67: "強い氷雨",
                71: "弱い雪", 73: "雪", 75: "大雪", 77: "細氷",
                80: "弱いにわか雨", 81: "にわか雨", 82: "激しいにわか雨",
                85: "弱いにわか雪", 86: "強いにわか雪",
                95: "雷雨", 96: "雷雨を伴う弱い雹", 99: "雷雨を伴う強い雹"
            };
            return map[code] || "不明な天気";
        }

        function getSmallIconPath(code) {
            const icons = {
                sun: '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 9c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zM12 1v2m0 18v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" fill="none"/>',
                cloud: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96z" fill="currentColor"/>',
                rain: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM11 15l-2 4m4-4l-2 4m4-4l-2 4" fill="currentColor" stroke="currentColor" stroke-width="1"/>',
                snow: '<path d="M12 2L12 22M2 12L22 12M5 5L19 19M5 19L19 5" stroke="currentColor" stroke-width="2" />',
                thunder: '<path d="M7 14l5-9v5h4l-5 9v-5H7z" fill="currentColor"/>'
            };
            if (code === 0 || code === 1) return icons.sun;
            if (code === 2 || code === 3 || (code >= 45 && code <= 48)) return icons.cloud;
            if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return icons.rain;
            if ([71, 73, 75, 77, 85, 86].includes(code)) return icons.snow;
            if ([95, 96, 99].includes(code)) return icons.thunder;
            return icons.cloud;
        }

        function getGeolocation() {
            return new Promise((resolve, reject) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        timeout: 5000,
                        maximumAge: 300000
                    });
                } else {
                    reject(new Error("Geolocation APIがサポートされていません"));
                }
            });
        }

        async function fetchLocationName(lat, lon) {
            const GEOCODE_URL = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ja`;
            try {
                const res = await fetch(GEOCODE_URL);
                const data = await res.json();
                return data.city || data.locality || data.principalSubdivision || "現在地";
            } catch (e) { return "現在地"; }
        }

        const svgUp = `<svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2 160 448c0 17.7 14.3 32 32 32s32-14.3 32-32l0-306.7L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z"></path></svg>`;
        const svgDown = `<svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"></path></svg>`;
        const svgDrop = `<svg viewBox="0 0 384 512" height="1em" width="1em"><path d="M192 512C86 512 0 426 0 320C0 228.8 130.2 57.7 166.6 11.7C172.6 4.2 181.5 0 191.1 0l1.8 0c9.6 0 18.5 4.2 24.5 11.7C253.8 57.7 384 228.8 384 320c0 106-86 192-192 192zM96 336c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 61.9 50.1 112 112 112c8.8 0 16-7.2 16-16s-7.2-16-16-16c-44.2 0-80-35.8-80-80z"></path></svg>`;

        async function updateWeather() {
            let lat = DEFAULT_LAT;
            let lon = DEFAULT_LON;

            try {
                document.getElementById('cw-loc').textContent = "位置情報取得中...";
                const pos = await getGeolocation();
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
            } catch (err) {
                console.warn("位置情報が取得できないため、デフォルト位置を使用します:", err.message);
            }

            const WEATHER_URL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation_probability,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=8`;

            try {
                const [weatherRes, locName] = await Promise.all([
                    fetch(WEATHER_URL),
                    fetchLocationName(lat, lon)
                ]);
                const data = await weatherRes.json();

                // 1. 今日の天気
                const currentTemp = Math.round(data.current_weather.temperature);
                const daily0 = {
                    high: Math.round(data.daily.temperature_2m_max[0]),
                    low: Math.round(data.daily.temperature_2m_min[0]),
                    rain: data.daily.precipitation_probability_max[0],
                    code: data.daily.weathercode[0]
                };

                document.getElementById('cw-desc').textContent = getWeatherText(daily0.code);
                document.getElementById('cw-loc').textContent = locName; 
                document.getElementById('cw-temp').textContent = currentTemp + "°";
                document.getElementById('cw-high').textContent = daily0.high + "°";
                document.getElementById('cw-low').textContent = daily0.low + "°";
                document.getElementById('cw-rain').textContent = daily0.rain + "%";

                // 2. 3時間ごとのタイムライン
                const hourlyContainer = document.getElementById('hourly-forecast');
                hourlyContainer.innerHTML = '';
                
                const now = new Date();
                now.setMinutes(0, 0, 0); 
                let itemsAdded = 0;

                for (let i = 0; i < data.hourly.time.length; i++) {
                    const timeObj = new Date(data.hourly.time[i]);
                    if (timeObj >= now && timeObj.getHours() % 3 === 0) {
                        const hr = timeObj.getHours();
                        const temp = Math.round(data.hourly.temperature_2m[i]);
                        const rain = data.hourly.precipitation_probability[i];
                        const code = data.hourly.weathercode[i];

                        const div = document.createElement('div');
                        div.className = 'hourly-item';
                        div.innerHTML = `
                            <div class="hr-time">${hr}</div>
                            <svg class="hr-icon" viewBox="0 0 24 24">${getSmallIconPath(code)}</svg>
                            <div class="hr-temp">${temp}°</div>
                            <div class="hr-rain">${rain}%</div>
                        `;
                        hourlyContainer.appendChild(div);
                        
                        itemsAdded++;
                        if (itemsAdded >= 7) break; 
                    }
                }

                // 3. 週間予報
                const listContainer = document.getElementById('forecast-list');
                listContainer.innerHTML = '';
                const days = ['日', '月', '火', '水', '木', '金', '土'];
                const baseDate = new Date();

                for (let i = 1; i <= 6; i++) {
                    const targetDate = new Date();
                    targetDate.setDate(baseDate.getDate() + i);
                    
                    const m = targetDate.getMonth() + 1;
                    const d = targetDate.getDate();
                    const w = targetDate.getDay();
                    
                    const hols = getJapaneseHolidays(targetDate.getFullYear(), targetDate.getMonth());
                    const isHol = hols[d] !== undefined;
                    
                    let dateClass = '';
                    if (w === 0 || isHol) dateClass = 'sunday';
                    else if (w === 6) dateClass = 'saturday';

                    const high = Math.round(data.daily.temperature_2m_max[i]);
                    const low = Math.round(data.daily.temperature_2m_min[i]);
                    const rain = data.daily.precipitation_probability_max[i];
                    const code = data.daily.weathercode[i];

                    const row = document.createElement('div');
                    row.className = 'forecast-row-min';
                    row.innerHTML = `
                        <div class="fc-date ${dateClass}">${m}/${d}(${days[w]})</div>
                        <div class="fc-desc">${getWeatherText(code)}</div>
                        <div class="fc-meta">
                            <div class="meta-item text-high">${svgUp}<span>${high}°</span></div>
                            <div class="meta-item text-low">${svgDown}<span>${low}°</span></div>
                            <div class="meta-item text-rain">${svgDrop}<span>${rain}%</span></div>
                        </div>
                    `;
                    listContainer.appendChild(row);
                }

            } catch (e) { console.error(e); }
        }
        updateWeather();
        setInterval(updateWeather, 30 * 60 * 1000);

        // --- 4. カレンダー機能 ---
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();
        const calTitle = document.getElementById('cal-title');
        const calGrid = document.getElementById('cal-grid');

        function renderCalendar(year, month) {
            calGrid.innerHTML = '';
            calTitle.textContent = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const holidays = getJapaneseHolidays(year, month);
            
            ['日','月','火','水','木','金','土'].forEach((d,i)=>{
                const div=document.createElement('div'); div.className='day-name';
                if(i===0)div.classList.add('sunday'); if(i===6)div.classList.add('saturday');
                div.textContent=d; calGrid.appendChild(div);
            });
            for(let i=0;i<firstDay.getDay();i++) calGrid.appendChild(document.createElement('div'));
            for(let d=1;d<=lastDay.getDate();d++){
                const div=document.createElement('div'); div.className='cal-cell'; div.textContent=d;
                const dt=new Date(year,month,d);
                if(dt.getDay()===0)div.classList.add('sunday');
                if(dt.getDay()===6)div.classList.add('saturday');
                if(holidays[d])div.classList.add('holiday');
                if(year===today.getFullYear()&&month===today.getMonth()&&d===today.getDate())div.classList.add('is-today');
                calGrid.appendChild(div);
            }
        }
        document.getElementById('prev-btn').addEventListener('click', ()=>{currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar(currentYear,currentMonth);});
        document.getElementById('next-btn').addEventListener('click', ()=>{currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar(currentYear,currentMonth);});
        document.getElementById('today-btn').addEventListener('click', ()=>{currentYear=today.getFullYear();currentMonth=today.getMonth();renderCalendar(currentYear,currentMonth);});
        renderCalendar(currentYear,currentMonth);

    </script>
</body>
</html>
